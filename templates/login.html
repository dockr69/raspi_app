<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Setup · Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--s1:#0f1218;--s2:#161b24;--s3:#1d2433;
  --border:#232b3a;--border2:#2e3a50;
  --acc:#00d4ff;--acc-dim:rgba(0,212,255,.1);
  --green:#00e676;--red:#ff5252;--red-dim:rgba(255,82,82,.1);
  --text:#e8edf5;--t2:#8899b0;--t3:#4a5568;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --r:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;display:flex;align-items:center;justify-content:center}
.box{width:340px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:36px 32px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.2em;color:var(--acc);text-align:center;margin-bottom:28px}
.logo span{display:block;width:32px;height:32px;border:2px solid var(--acc);border-radius:50%;margin:0 auto 12px;position:relative}
.logo span::after{content:'';position:absolute;width:8px;height:8px;background:var(--acc);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
label{display:block;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
input[type=text],input[type=password]{
  width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:var(--r);
  padding:10px 13px;font-family:var(--mono);font-size:13px;color:var(--text);
  outline:none;transition:border-color .15s;margin-bottom:16px
}
input:focus{border-color:var(--acc)}
button{
  width:100%;background:var(--acc);color:#0a0c10;border:none;border-radius:var(--r);
  padding:11px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.05em;
  cursor:pointer;transition:opacity .15s;margin-top:4px
}
button:hover{opacity:.85}
.error{background:var(--red-dim);border:1px solid rgba(255,82,82,.3);border-radius:6px;
  padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:16px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><span></span>AUDIO · SETUP</div>
  <form method="POST" autocomplete="off">
    {% if error %}
    <div class="error">✗ {{ error }}</div>
    {% endif %}
    <label>Benutzername</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Passwort</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Anmelden →</button>
  </form>
</div>
</body>
</html>
